<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anomaly · Editing Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#92ABA7; --sage-700:#6f8a85; --sage-800:#5c7470;
  --sage-soft:#eaf0ee; --sage-tint:#f2f6f4;
  --ink:#1c211f; --ink-2:#4a514e; --muted:#8b918e;
  --paper:#ffffff; --canvas:#f5f7f6; --line:#e7eae8; --line-2:#dfe3e1;
  --red:#bd5240; --red-soft:#fbeeeb; --amber:#c1873a; --amber-soft:#fbf3e8;
  --shadow:0 1px 2px rgba(28,33,31,.05),0 4px 16px rgba(28,33,31,.06);
  --shadow-lg:0 12px 40px rgba(28,33,31,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}

.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand img{width:34px;height:34px;border-radius:50%;display:block;box-shadow:0 1px 4px rgba(28,33,31,.12)}
.brand .bt{display:flex;flex-direction:column;line-height:1.05}
.brand .b1{font-family:"Outfit";font-weight:700;letter-spacing:.14em;font-size:13px;text-transform:uppercase}
.brand .b2{font-size:11px;color:var(--muted);letter-spacing:.04em}
.spacer{flex:1}
.btn{border:1px solid var(--line-2);background:var(--paper);color:var(--ink);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.14s}
.btn:hover{border-color:var(--sage);background:var(--sage-tint)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:var(--sage-800);border-color:var(--sage-800)}
.btn svg{width:15px;height:15px}

.controls{display:flex;align-items:center;gap:10px;padding:12px 22px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:63px;z-index:20;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--canvas);padding:4px;border-radius:11px;border:1px solid var(--line)}
.tab{border:none;background:transparent;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-2);display:inline-flex;align-items:center;gap:7px;transition:.12s}
.tab .ct{font-size:11px;font-weight:700;background:var(--line);color:var(--ink-2);border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
.tab.active .ct{background:var(--sage);color:#fff}
.tab.master.active{background:var(--ink);color:#fff}
.tab.master.active .ct{background:var(--sage)}
.field{display:inline-flex;align-items:center;gap:7px}
.field label{font-size:12px;color:var(--muted);font-weight:600}
select.sel{border:1px solid var(--line-2);background:var(--paper);border-radius:9px;padding:7px 10px;font-weight:600;color:var(--ink);cursor:pointer}
select.sel:hover{border-color:var(--sage)}

.wrap{max-width:1320px;margin:0 auto;padding:22px}
.syncbar{display:flex;align-items:center;gap:8px;padding:8px 22px;background:var(--sage-tint);border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-2)}
.syncbar>svg{width:14px;height:14px;color:var(--sage-800);flex-shrink:0}
.synctxt{font-weight:600;color:var(--muted);white-space:nowrap}
.synctxt.ok{color:var(--sage-800)} .synctxt.err{color:var(--red)} .synctxt.local{color:var(--amber)}
.syncbtn{border:1px solid var(--line-2);background:var(--paper);border-radius:8px;padding:5px 11px;font-weight:600;font-size:12px;color:var(--ink)}
.syncbtn:hover{border-color:var(--sage)}
@media(max-width:640px){.syncbar>span:not(.synctxt):not(.spacer){display:none}}

/* stats */
.stats{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:13px 18px;min-width:118px;box-shadow:var(--shadow);flex:1}
.stat .sv{font-family:"Outfit";font-weight:700;font-size:26px;line-height:1}
.stat .sl{font-size:12px;color:var(--muted);font-weight:600;margin-top:5px;letter-spacing:.02em}
.stat.over .sv{color:var(--red)} .stat.soon .sv{color:var(--amber)} .stat.sage .sv{color:var(--sage-800)}

.group-h{display:flex;align-items:center;gap:10px;margin:22px 2px 9px}
.group-h .gt{font-family:"Outfit";font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.group-h .gline{flex:1;height:1px;background:var(--line)}
.group-h .gc{font-size:12px;color:var(--muted);font-weight:600}

.tbl{background:var(--paper);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow)}
.row,.head-row{display:grid;grid-template-columns:38px minmax(0,1.4fr) 124px 96px 104px minmax(0,1.9fr) 70px;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);transition:background .12s}
.head-row{background:var(--sage-tint);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-2);font-weight:700;padding:9px 16px}
.row:last-child{border-bottom:none}
.row:hover{background:var(--sage-tint)}
.row.done{opacity:.5;background:var(--canvas)}
.row.done .cli-name,.row.done .notes,.row.done .ptitle{text-decoration:line-through;text-decoration-color:var(--muted)}

.cb{appearance:none;width:20px;height:20px;border:2px solid var(--line-2);border-radius:6px;display:grid;place-items:center;transition:.12s;cursor:pointer;background:var(--paper)}
.cb:hover{border-color:var(--sage)}
.cb:checked{background:var(--sage);border-color:var(--sage)}
.cb:checked::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(43deg) translateY(-1px)}

.cli{display:flex;align-items:center;gap:9px;min-width:0}
.abbr{font-family:"Outfit";font-weight:700;font-size:11px;letter-spacing:.05em;background:var(--ink);color:#fff;border-radius:6px;padding:3px 7px;flex-shrink:0}
.cli-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.catb{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block;border:1px solid;white-space:nowrap}
.catb.services{background:var(--sage-soft);border-color:#d3e1dd;color:var(--sage-800)}
.catb.personal_brand{background:#f7eef0;border-color:#ecd9de;color:#9a5566}
.catb.real_estate{background:#eef1f6;border-color:#dbe1ec;color:#4a5878}
.catb.fitness{background:#eaf3ed;border-color:#d2e6da;color:#3f7457}
.catb.misc{background:#f1f2f1;border-color:#e2e5e3;color:#6a716e}

.tbadge{font-family:"Outfit";font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line-2);color:var(--ink-2);display:inline-block;white-space:nowrap}
.tbadge.daily{background:#eef3f1;border-color:#d5e1dd;color:var(--sage-800)}
.tbadge.longform{background:#eef1f5;border-color:#dbe1ea;color:#4a5878}
.tbadge.clips{background:#f5eef3;border-color:#e9dbe5;color:#7a4a6c}
.tbadge.batch{background:#f3f0ea;border-color:#e6ddcd;color:#7a6a45}
.tbadge.listings{background:#eaf3ee;border-color:#d3e6dc;color:#3f7457}

.due{font-weight:600;font-size:13px;color:var(--ink-2);white-space:nowrap}
.due .pill{display:inline-block;padding:3px 9px;border-radius:7px;font-size:12px}
.due.over .pill{background:var(--red-soft);color:var(--red)}
.due.soon .pill{background:var(--amber-soft);color:var(--amber)}
.due.ok .pill{background:var(--sage-soft);color:var(--sage-800)}
.due.none{color:var(--muted);font-weight:500;font-style:italic;font-size:12px}

.links{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.lk{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);display:grid;place-items:center;color:var(--ink-2);background:var(--paper);transition:.12s;text-decoration:none}
.lk:hover{border-color:var(--sage);color:var(--sage-800);background:var(--sage-tint)}
.lk svg{width:15px;height:15px}
.lk.off{opacity:.28;pointer-events:none}

.ptitle{font-weight:600;color:var(--ink);font-size:13px;margin-bottom:3px;line-height:1.3}
.notes{color:var(--ink-2);font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notes.empty{color:var(--muted);font-style:italic;opacity:.6}

.rowacts{display:flex;gap:4px;justify-content:flex-end}
.ic{width:30px;height:30px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);display:grid;place-items:center;transition:.12s}
.ic:hover{background:var(--line);color:var(--ink)}
.ic.del:hover{background:var(--red-soft);color:var(--red)}
.ic svg{width:15px;height:15px}

.empty{padding:46px 20px;text-align:center;color:var(--muted)}
.empty .eb{font-family:"Outfit";font-weight:600;color:var(--ink-2);font-size:15px;margin-bottom:4px}

.completed-sec{margin-top:30px}
.comp-toggle{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;padding:8px 2px;color:var(--muted);font-weight:600;font-size:13px}
.comp-toggle:hover{color:var(--ink-2)}
.comp-toggle .chev{transition:transform .18s}
.comp-toggle.open .chev{transform:rotate(90deg)}
.comp-toggle .gline{flex:1;height:1px;background:var(--line)}
.comp-body{display:none;margin-top:10px}
.comp-body.open{display:block}

.scrim{position:fixed;inset:0;background:rgba(28,33,31,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:40px 16px;overflow:auto}
.scrim.open{display:flex}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .18s ease}
.modal.wide{max-width:740px}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.mh h2{font-family:"Outfit";font-weight:700;font-size:17px;margin:0;letter-spacing:.01em}
.mb{padding:20px 22px;max-height:66vh;overflow:auto}
.mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--canvas)}
.x{border:none;background:transparent;color:var(--muted);width:32px;height:32px;border-radius:8px;display:grid;place-items:center}
.x:hover{background:var(--line);color:var(--ink)}
.x svg{width:18px;height:18px}

.frow{margin-bottom:15px}
.frow label{display:block;font-weight:600;font-size:12px;color:var(--ink-2);margin-bottom:6px;letter-spacing:.02em}
.frow label .opt{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
.inp{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:10px 12px;color:var(--ink);background:var(--paper);transition:.12s}
.inp:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}
textarea.inp{resize:vertical;min-height:64px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.typepick{display:flex;gap:7px;flex-wrap:wrap}
.tp{border:1px solid var(--line-2);background:var(--paper);padding:8px 13px;border-radius:9px;font-weight:600;font-size:13px;color:var(--ink-2)}
.tp:hover{border-color:var(--sage)}
.tp.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.hint{font-size:12px;color:var(--muted);margin-top:5px}
.hidden{display:none!important}

.cl-add{display:grid;grid-template-columns:1fr 92px 1fr 40px;gap:9px;align-items:end;background:var(--sage-tint);padding:13px;border-radius:11px;margin-bottom:14px}
.cl-add .frow{margin:0}
.cl-list{border:1px solid var(--line);border-radius:11px;overflow:hidden}
.cl-item{display:grid;grid-template-columns:62px 1fr 1fr 36px;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
.cl-item:last-child{border-bottom:none}
.cl-item:nth-child(even){background:var(--canvas)}
.cl-item .abbr{justify-self:start}
.cl-item .cn{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-item select{border:1px solid var(--line-2);border-radius:8px;padding:6px 8px;background:var(--paper);font-weight:600;font-size:13px}
.search{position:relative;margin-bottom:12px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search input{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:9px 12px 9px 34px}
.search input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:980px){
  .row,.head-row{grid-template-columns:34px minmax(0,1.3fr) 96px minmax(0,1.5fr) 62px;gap:9px}
  .row .due,.head-row .h-due{display:none}
  .row .type-cell,.head-row .h-type{display:none}
  .wrap{padding:14px}
  .f2,.cl-add{grid-template-columns:1fr}
  .stat{min-width:46%}
}
</style>

const CATS={services:"Services",personal_brand:"Personal Brand",real_estate:"Real Estate",fitness:"Fitness",misc:"Misc"};

/* ============ backend (Firebase if configured, else this browser) ============ */
const USE_FB=!!FIREBASE_CONFIG.projectId;
let db=null, fbReady=false;
const mem={};
const LS={
  get(k,fb){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch(e){return (k in mem)?mem[k]:fb;}},
  set(k,v){mem[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
const LK_C="acc_clients_v1", LK_T="acc_tasks_v1";
const fb=()=>USE_FB&&fbReady&&db;

const backend={
  async upsertClient(c){const i=state.clients.findIndex(x=>x.abbr===c.abbr);if(i>=0)state.clients[i]=c;else state.clients.push(c);if(fb())await setDoc(doc(db,"clients",c.abbr),c);else LS.set(LK_C,state.clients);},
  async removeClient(abbr){state.clients=state.clients.filter(c=>c.abbr!==abbr);if(fb())await deleteDoc(doc(db,"clients",abbr));else LS.set(LK_C,state.clients);},
  async upsertTask(t){const i=state.tasks.findIndex(x=>x.id===t.id);if(i>=0)state.tasks[i]=t;else state.tasks.push(t);if(fb())await setDoc(doc(db,"tasks",t.id),t);else LS.set(LK_T,state.tasks);},
  async removeTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);if(fb())await deleteDoc(doc(db,"tasks",id));else LS.set(LK_T,state.tasks);},
};

/* ============ state ============ */
let state={clients:[],tasks:[],tab:"master",cat:"all",sort:"urgency"};

async function init(){
  buildCatSelects(); buildTabs(); wireUp();
  if(USE_FB) await initFirebase();
  else initLocal();
}
function initLocal(){
  let cl=LS.get(LK_C,null); if(!cl||!cl.length){cl=SEED_CLIENTS.slice();LS.set(LK_C,cl);}
  let tk=LS.get(LK_T,null); if(tk===null){tk=sampleTasks();LS.set(LK_T,tk);}
  state.clients=cl; state.tasks=tk;
  setSyncStatus("local"); refreshUI();
}
async function initFirebase(){
  setSyncStatus("connecting");
  try{
    const app=initializeApp(FIREBASE_CONFIG); db=getFirestore(app); fbReady=true;
    const snap=await getDocs(collection(db,"clients"));
    if(snap.empty){const b=writeBatch(db);SEED_CLIENTS.forEach(c=>b.set(doc(db,"clients",c.abbr),c));await b.commit();}
    onSnapshot(collection(db,"clients"),s=>{state.clients=s.docs.map(d=>d.data());setSyncStatus("ok");refreshUI();},()=>setSyncStatus("err"));
    onSnapshot(collection(db,"tasks"),s=>{state.tasks=s.docs.map(d=>d.data());setSyncStatus("ok");refreshUI();},()=>setSyncStatus("err"));
  }catch(e){console.error("Firebase error:",e);setSyncStatus("err");fbReady=false;initLocal();}
}

/* ============ helpers ============ */
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const clientByAbbr=a=>state.clients.find(c=>c.abbr===a);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dueInfo(ds){
  if(!ds)return null;
  const today=new Date(todayStr()+"T00:00:00"),due=new Date(ds+"T00:00:00");
  const days=Math.round((due-today)/86400000);let cls="ok",label;
  if(days<0){label=`${-days}d overdue`;cls="over";}
  else if(days===0){label="Today";cls="soon";}
  else if(days===1){label="Tomorrow";cls="soon";}
  else if(days<=6){label=`${days} days`;cls=days<=3?"soon":"ok";}
  else label=new Date(ds+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"});
  return {days,label,cls};
}
function refreshUI(){render();if($("#cliScrim").classList.contains("open"))renderClients($("#cliSearch").value);}

/* ============ selects & tabs ============ */
function buildCatSelects(){
  $("#catFilter").innerHTML=`<option value="all">All categories</option>`+Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");
  $("#ncCat").innerHTML=Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");
}
function buildTabs(){
  const el=$("#tabs");
  const tabs=[{id:"master",label:"Master"}].concat(TYPES.map(t=>({id:t.id,label:t.label})));
  el.innerHTML=tabs.map(t=>`<button class="tab${t.id==="master"?" master":""}${t.id===state.tab?" active":""}" data-tab="${t.id}">${t.label}<span class="ct" data-ct="${t.id}">0</span></button>`).join("");
  el.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;buildTabs();render();});
}
function updateCounts(){
  const active=state.tasks.filter(t=>!t.completed);
  TYPES.forEach(t=>{const e=document.querySelector(`[data-ct="${t.id}"]`);if(e)e.textContent=active.filter(x=>x.type===t.id).length;});
  const m=document.querySelector('[data-ct="master"]');if(m)m.textContent=active.length;
}

/* ============ filter & sort ============ */
function passCat(t){if(state.cat==="all")return true;const c=clientByAbbr(t.clientAbbr);return c&&c.cat===state.cat;}
function urg(t){return t.dueDate?new Date(t.dueDate).getTime():Infinity;}
function sortTasks(arr){
  const a=arr.slice();const name=t=>clientByAbbr(t.clientAbbr)?.name||t.clientAbbr;
  const cat=t=>clientByAbbr(t.clientAbbr)?.cat||"zzz";
  if(state.sort==="client")a.sort((x,y)=>name(x).localeCompare(name(y)));
  else if(state.sort==="added")a.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  else if(state.sort==="type")a.sort((x,y)=>(TYPE_ORDER[x.type]-TYPE_ORDER[y.type])||(urg(x)-urg(y)));
  else if(state.sort==="category")a.sort((x,y)=>(CATS[cat(x)]||"zz").localeCompare(CATS[cat(y)]||"zz")||name(x).localeCompare(name(y)));
  else a.sort((x,y)=>(urg(x)-urg(y))||(x.createdAt||0)-(y.createdAt||0));
  return a;
}

/* ============ render ============ */
function render(){
  updateCounts();
  const board=$("#board"),statsEl=$("#stats");
  const pool=state.tasks.filter(t=>passCat(t)&&(state.tab==="master"||t.type===state.tab));
  const active=sortTasks(pool.filter(t=>!t.completed));
  if(state.tab==="master"){
    const over=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days<0).length;
    const soon=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days>=0&&dueInfo(t.dueDate).days<=6).length;
    const dailies=active.filter(t=>t.type==="daily").length;
    const done=pool.filter(t=>t.completed).length;
    statsEl.innerHTML=`<div class="stats">
      <div class="stat"><div class="sv">${active.length}</div><div class="sl">Active in pipeline</div></div>
      <div class="stat over"><div class="sv">${over}</div><div class="sl">Overdue</div></div>
      <div class="stat soon"><div class="sv">${soon}</div><div class="sl">Due within 7 days</div></div>
      <div class="stat sage"><div class="sv">${dailies}</div><div class="sl">Active dailies</div></div>
      <div class="stat"><div class="sv">${done}</div><div class="sl">Completed</div></div>
    </div>`;
  }else statsEl.innerHTML="";
  board.innerHTML=active.length?tableHTML(active):emptyHTML();
  bindRows(board);
  const done=pool.filter(t=>t.completed).sort((x,y)=>(y.completedAt||0)-(x.completedAt||0));
  $("#compLabel").textContent=`Completed (${done.length})`;
  const cb=$("#compBody");
  cb.innerHTML=done.length?tableHTML(done):`<div class="empty"><div>Nothing completed yet.</div></div>`;
  bindRows(cb);
}
function emptyHTML(){return `<div class="tbl"><div class="empty"><div class="eb">No entries here yet</div>Hit <b>New Entry</b> to add one to the pipeline.</div></div>`;}
function tableHTML(rows){
  const head=`<div class="head-row"><span></span><span>Client</span><span class="h-cat">Category</span><span class="h-type">Type</span><span class="h-due">Due</span><span>Notes / Links</span><span></span></div>`;
  return `<div class="tbl">${head}${rows.map(rowHTML).join("")}</div>`;
}
const ICON={
  link:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>`,
  folder:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`,
  audio:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
};
function rowHTML(t){
  const c=clientByAbbr(t.clientAbbr)||{name:t.clientAbbr,abbr:t.clientAbbr,cat:"misc"};
  const tp=TYPE_MAP[t.type]||{label:t.type};
  const di=tp.due?dueInfo(t.dueDate):null;
  const dueCell=!tp.due?`<span class="due none">—</span>`:(di?`<span class="due ${di.cls}"><span class="pill">${esc(di.label)}</span></span>`:`<span class="due none">no date</span>`);
  const link=(url,kind,svg)=>`<a class="lk ${url?"":"off"}" ${url?`href="${esc(url)}" target="_blank" rel="noopener"`:""} title="${kind}">${svg}</a>`;
  return `<div class="row ${t.completed?"done":""}" data-id="${t.id}">
    <input type="checkbox" class="cb" data-act="toggle" ${t.completed?"checked":""}>
    <div class="cli"><span class="abbr">${esc(c.abbr)}</span><div style="min-width:0"><div class="cli-name">${esc(c.name)}</div></div></div>
    <span class="cat-cell"><span class="catb ${c.cat}">${CATS[c.cat]||"—"}</span></span>
    <span class="type-cell"><span class="tbadge ${t.type}">${esc(tp.label)}</span></span>
    ${dueCell}
    <div style="min-width:0">
      ${t.projectName?`<div class="ptitle">${esc(t.projectName)}</div>`:""}
      <div class="notes ${t.notes?"":"empty"}">${t.notes?esc(t.notes):"No notes"}</div>
      <div class="links">
        ${link(t.projectUrl,"Project / resources",ICON.link)}
        ${link(t.footageUrl,"Footage folder",ICON.folder)}
        ${link(t.audioUrl,"Audio file",ICON.audio)}
      </div>
    </div>
    <div class="rowacts">
      <button class="ic" data-act="edit" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="ic del" data-act="del" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div>
  </div>`;
}
function bindRows(scope){
  scope.querySelectorAll(".row[data-id]").forEach(r=>{
    const id=r.dataset.id;
    r.querySelector('[data-act="toggle"]')?.addEventListener("change",()=>toggleDone(id));
    r.querySelector('[data-act="edit"]')?.addEventListener("click",()=>openEdit(id));
    r.querySelector('[data-act="del"]')?.addEventListener("click",()=>delTask(id));
  });
}

/* ============ task ops ============ */
async function toggleDone(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  await backend.upsertTask({...t,completed:!t.completed,completedAt:!t.completed?Date.now():null});
  refreshUI();toast(!t.completed?"Marked complete":"Reopened");
}
async function delTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  if(!confirm(`Delete this ${TYPE_MAP[t.type]?.label} entry for ${clientByAbbr(t.clientAbbr)?.name||t.clientAbbr}?`))return;
  await backend.removeTask(id);refreshUI();toast("Deleted");
}

/* ============ add/edit ============ */
let curType="longform";
function buildTypePick(){
  $("#typePick").innerHTML=TYPES.map(t=>`<button class="tp${t.id===curType?" sel":""}" data-tp="${t.id}">${t.label}</button>`).join("");
  $("#typePick").querySelectorAll(".tp").forEach(b=>b.onclick=()=>{curType=b.dataset.tp;buildTypePick();syncDueRow();});
}
function syncDueRow(){$("#dueRow").classList.toggle("hidden",!TYPE_MAP[curType].due);}
function fillClientSelect(sel){sel.innerHTML=state.clients.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`<option value="${esc(c.abbr)}">${esc(c.abbr)} — ${esc(c.name)}</option>`).join("");}
function openAdd(){
  $("#editId").value="";$("#addTitle").textContent="New Entry";
  curType=(state.tab!=="master"&&TYPE_MAP[state.tab])?state.tab:"longform";
  buildTypePick();syncDueRow();fillClientSelect($("#fClient"));
  $("#fName").value="";$("#fDue").value="";$("#fProject").value="";$("#fFootage").value="";$("#fAudio").value="";$("#fNotes").value="";
  $("#addScrim").classList.add("open");
}
function openEdit(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  $("#editId").value=id;$("#addTitle").textContent="Edit Entry";
  curType=t.type;buildTypePick();syncDueRow();fillClientSelect($("#fClient"));
  $("#fClient").value=t.clientAbbr;$("#fName").value=t.projectName||"";$("#fDue").value=t.dueDate||"";
  $("#fProject").value=t.projectUrl||"";$("#fFootage").value=t.footageUrl||"";$("#fAudio").value=t.audioUrl||"";$("#fNotes").value=t.notes||"";
  $("#addScrim").classList.add("open");
}
async function saveEntry(){
  const id=$("#editId").value,abbr=$("#fClient").value;
  if(!abbr){toast("Pick a client");return;}
  const due=TYPE_MAP[curType].due?($("#fDue").value||null):null;
  const data={type:curType,clientAbbr:abbr,projectName:$("#fName").value.trim(),dueDate:due,projectUrl:$("#fProject").value.trim(),footageUrl:$("#fFootage").value.trim(),audioUrl:$("#fAudio").value.trim(),notes:$("#fNotes").value.trim()};
  let task;
  if(id){const ex=state.tasks.find(x=>x.id===id);task=ex?{...ex,...data}:{id,completed:false,completedAt:null,createdAt:Date.now(),...data};}
  else task={id:"t"+Date.now()+Math.random().toString(36).slice(2,6),completed:false,completedAt:null,createdAt:Date.now(),...data};
  await backend.upsertTask(task);
  $("#addScrim").classList.remove("open");refreshUI();toast(id?"Saved":"Entry added");
}

/* ============ clients manager ============ */
function renderClients(filter=""){
  const f=filter.toLowerCase();
  const list=state.clients.slice().sort((a,b)=>a.name.localeCompare(b.name)).filter(c=>!f||c.name.toLowerCase().includes(f)||c.abbr.toLowerCase().includes(f));
  $("#cliList").innerHTML=list.map(c=>`
    <div class="cl-item" data-abbr="${esc(c.abbr)}">
      <span class="abbr">${esc(c.abbr)}</span>
      <span class="cn">${esc(c.name)}</span>
      <select data-act="cat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${c.cat===k?"selected":""}>${v}</option>`).join("")}</select>
      <button class="ic del" data-act="rm" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div>`).join("")||`<div class="empty">No matches.</div>`;
  $("#cliList").querySelectorAll(".cl-item").forEach(it=>{
    const abbr=it.dataset.abbr;
    it.querySelector('[data-act="cat"]').onchange=async e=>{const c=clientByAbbr(abbr);if(c){await backend.upsertClient({...c,cat:e.target.value});render();}};
    it.querySelector('[data-act="rm"]').onclick=async ()=>{
      const used=state.tasks.some(t=>t.clientAbbr===abbr);
      if(used&&!confirm("This client has entries in the pipeline. Remove the client anyway? (entries stay but show the code only)"))return;
      if(!used&&!confirm("Remove this client?"))return;
      await backend.removeClient(abbr);renderClients($("#cliSearch").value);render();
    };
  });
}
function suggestAbbr(name){
  const clean=name.replace(/[^a-zA-Z ]/g,"").trim();
  let base=clean.replace(/\s+/g,"").slice(0,4).toUpperCase();
  if(base.length<2)return"";
  let a=base,i=1;while(clientByAbbr(a)){a=(base.slice(0,3)+i).toUpperCase();i++;}
  return a;
}
async function addClient(){
  const name=$("#ncName").value.trim();let abbr=$("#ncAbbr").value.trim().toUpperCase();
  if(!name){toast("Enter a name");return;}
  if(!abbr)abbr=suggestAbbr(name);
  if(!abbr){toast("Enter an abbreviation");return;}
  if(clientByAbbr(abbr)){toast("That abbreviation is taken");return;}
  await backend.upsertClient({name,abbr,cat:$("#ncCat").value});
  $("#ncName").value="";$("#ncAbbr").value="";
  renderClients($("#cliSearch").value);render();toast(`Added ${abbr}`);
}

/* ============ sync status ============ */
function setSyncStatus(s){
  const e=$("#syncTxt");if(!e)return;
  e.className="synctxt "+s;
  e.textContent= s==="ok"?"Live · synced across your team"
    : s==="connecting"?"Connecting to team workspace…"
    : s==="err"?"Can't reach the database — check your Firebase config"
    : "This browser only — add Firebase to sync the team";
  const b=$("#syncBtn"); if(b) b.style.display=USE_FB?"none":"none"; // real-time; manual button not needed
}

/* ============ wire up ============ */
function wireUp(){
  $("#openAdd").onclick=openAdd;$("#saveEntry").onclick=saveEntry;
  $("#openClients").onclick=()=>{renderClients();$("#cliScrim").classList.add("open");};
  $("#addClient").onclick=addClient;
  $("#cliSearch").oninput=e=>renderClients(e.target.value);
  $("#ncName").oninput=e=>{if(!$("#ncAbbr").value)$("#ncAbbr").placeholder=suggestAbbr(e.target.value)||"ABCD";};
  $("#ncName").onkeydown=e=>{if(e.key==="Enter")addClient();};
  $("#ncAbbr").onkeydown=e=>{if(e.key==="Enter")addClient();};
  $("#catFilter").onchange=e=>{state.cat=e.target.value;render();};
  $("#sortBy").onchange=e=>{state.sort=e.target.value;render();};
  $("#compToggle").onclick=()=>{$("#compToggle").classList.toggle("open");$("#compBody").classList.toggle("open");};
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>b.closest(".scrim").classList.remove("open"));
  document.querySelectorAll(".scrim").forEach(s=>s.addEventListener("click",e=>{if(e.target===s)s.classList.remove("open");}));
  document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".scrim.open").forEach(s=>s.classList.remove("open"));});
}

init();

</script>
