<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anomaly · Editing Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#92ABA7; --sage-700:#6f8a85; --sage-800:#5c7470;
  --sage-soft:#eaf0ee; --sage-tint:#f2f6f4;
  --ink:#1c211f; --ink-2:#4a514e; --muted:#8b918e;
  --paper:#ffffff; --canvas:#f5f7f6; --line:#e7eae8; --line-2:#dfe3e1;
  --red:#bd5240; --red-soft:#fbeeeb; --amber:#c1873a; --amber-soft:#fbf3e8;
  --shadow:0 1px 2px rgba(28,33,31,.05),0 4px 16px rgba(28,33,31,.06);
  --shadow-lg:0 12px 40px rgba(28,33,31,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}

.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand img{width:34px;height:34px;border-radius:50%;display:block;box-shadow:0 1px 4px rgba(28,33,31,.12)}
.brand .bt{display:flex;flex-direction:column;line-height:1.05}
.brand .b1{font-family:"Outfit";font-weight:700;letter-spacing:.14em;font-size:13px;text-transform:uppercase}
.brand .b2{font-size:11px;color:var(--muted);letter-spacing:.04em}
.spacer{flex:1}
.btn{border:1px solid var(--line-2);background:var(--paper);color:var(--ink);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.14s}
.btn:hover{border-color:var(--sage);background:var(--sage-tint)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:var(--sage-800);border-color:var(--sage-800)}
.btn svg{width:15px;height:15px}

.controls{display:flex;align-items:center;gap:10px;padding:12px 22px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:63px;z-index:20;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--canvas);padding:4px;border-radius:11px;border:1px solid var(--line)}
.tab{border:none;background:transparent;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-2);display:inline-flex;align-items:center;gap:7px;transition:.12s}
.tab .ct{font-size:11px;font-weight:700;background:var(--line);color:var(--ink-2);border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
.tab.active .ct{background:var(--sage);color:#fff}
.tab.master.active{background:var(--ink);color:#fff}
.tab.master.active .ct{background:var(--sage)}
.viewtog{display:flex;gap:4px;background:var(--canvas);padding:4px;border-radius:11px;border:1px solid var(--line);margin-left:8px}
.vt{border:none;background:transparent;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-2)}
.vt:hover{color:var(--ink)}
.vt.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
.cal{background:var(--paper);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.cal-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.cal-head h3{font-family:"Outfit";font-size:17px;margin:0;font-weight:700;letter-spacing:.01em}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:32px}
.cal-nav button,.cal-today{border:1px solid var(--line-2);background:var(--paper);border-radius:8px;height:32px;padding:0 12px;font-weight:600;color:var(--ink);display:grid;place-items:center;font-size:15px}
.cal-nav button:hover,.cal-today:hover{border-color:var(--sage);background:var(--sage-tint)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sage-tint);border-bottom:1px solid var(--line)}
.cal-dow span{padding:8px 10px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1 1 auto;grid-auto-rows:minmax(112px,1fr)}
.cal-cell{min-height:108px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;display:flex;flex-direction:column;gap:4px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other{background:var(--canvas)}
.cal-cell.other .cal-num{color:var(--muted);opacity:.45}
.cal-num{font-size:12px;font-weight:700;color:var(--ink-2);width:24px;height:24px;display:grid;place-items:center;border-radius:50%}
.cal-cell.today .cal-num{background:var(--sage);color:#fff}
.cchip{border:none;text-align:left;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;display:block}
.cchip:hover{filter:brightness(.96)}
.cchip.over{box-shadow:inset 0 0 0 1px var(--red)}
.cchip.daily{background:#eef3f1;color:var(--sage-800)}
.cchip.longform{background:#eef1f5;color:#4a5878}
.cchip.clips{background:#f5eef3;color:#7a4a6c}
.cchip.batch{background:#f3f0ea;color:#7a6a45}
.cchip.listings{background:#eaf3ee;color:#3f7457}
.cal-nodate{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--line);background:var(--canvas)}
.cal-nodate .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cal-nodate .cchip{width:auto}
@media(max-width:760px){.cal-cell{min-height:72px}.cchip{font-size:10px;padding:2px 5px}}
.field{display:inline-flex;align-items:center;gap:7px}
.field label{font-size:12px;color:var(--muted);font-weight:600}
select.sel{border:1px solid var(--line-2);background:var(--paper);border-radius:9px;padding:7px 10px;font-weight:600;color:var(--ink);cursor:pointer}
select.sel:hover{border-color:var(--sage)}

.wrap{max-width:1320px;margin:0 auto;padding:22px 22px 104px}
.syncbar{display:flex;align-items:center;gap:8px;padding:8px 22px;background:var(--sage-tint);border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-2)}
.syncbar>svg{width:14px;height:14px;color:var(--sage-800);flex-shrink:0}
.synctxt{font-weight:600;color:var(--muted);white-space:nowrap}
.synctxt.ok{color:var(--sage-800)} .synctxt.err{color:var(--red)} .synctxt.local{color:var(--amber)}
.syncbtn{border:1px solid var(--line-2);background:var(--paper);border-radius:8px;padding:5px 11px;font-weight:600;font-size:12px;color:var(--ink)}
.syncbtn:hover{border-color:var(--sage)}
@media(max-width:640px){.syncbar>span:not(.synctxt):not(.spacer){display:none}}

/* stats */
.stats{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:13px 18px;min-width:118px;box-shadow:var(--shadow);flex:1}
.stat .sv{font-family:"Outfit";font-weight:700;font-size:26px;line-height:1}
.stat .sl{font-size:12px;color:var(--muted);font-weight:600;margin-top:5px;letter-spacing:.02em}
.stat.over .sv{color:var(--red)} .stat.soon .sv{color:var(--amber)} .stat.sage .sv{color:var(--sage-800)}

.group-h{display:flex;align-items:center;gap:10px;margin:22px 2px 9px}
.group-h .gt{font-family:"Outfit";font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.group-h .gline{flex:1;height:1px;background:var(--line)}
.group-h .gc{font-size:12px;color:var(--muted);font-weight:600}

.tbl{background:var(--paper);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow)}
.row,.head-row{display:grid;grid-template-columns:38px minmax(0,1.4fr) 124px 96px 104px minmax(0,1.9fr) 70px;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);transition:background .12s}
.head-row{background:var(--sage-tint);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-2);font-weight:700;padding:9px 16px}
.row:last-child{border-bottom:none}
.row:hover{background:var(--sage-tint)}
.row.done{opacity:.5;background:var(--canvas)}
.row.done .cli-name,.row.done .notes,.row.done .ptitle{text-decoration:line-through;text-decoration-color:var(--muted)}

.cb{appearance:none;width:20px;height:20px;border:2px solid var(--line-2);border-radius:6px;display:grid;place-items:center;transition:.12s;cursor:pointer;background:var(--paper)}
.cb:hover{border-color:var(--sage)}
.cb:checked{background:var(--sage);border-color:var(--sage)}
.cb:checked::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(43deg) translateY(-1px)}

.cli{display:flex;align-items:center;gap:9px;min-width:0}
.abbr{font-family:"Outfit";font-weight:700;font-size:11px;letter-spacing:.05em;background:var(--ink);color:#fff;border-radius:6px;padding:3px 7px;flex-shrink:0}
.cli-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.catb{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block;border:1px solid;white-space:nowrap}
.catb.services{background:var(--sage-soft);border-color:#d3e1dd;color:var(--sage-800)}
.catb.personal_brand{background:#f7eef0;border-color:#ecd9de;color:#9a5566}
.catb.real_estate{background:#eef1f6;border-color:#dbe1ec;color:#4a5878}
.catb.fitness{background:#eaf3ed;border-color:#d2e6da;color:#3f7457}
.catb.misc{background:#f1f2f1;border-color:#e2e5e3;color:#6a716e}

.tbadge{font-family:"Outfit";font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line-2);color:var(--ink-2);display:inline-block;white-space:nowrap}
.tbadge.daily{background:#eef3f1;border-color:#d5e1dd;color:var(--sage-800)}
.tbadge.longform{background:#eef1f5;border-color:#dbe1ea;color:#4a5878}
.tbadge.clips{background:#f5eef3;border-color:#e9dbe5;color:#7a4a6c}
.tbadge.batch{background:#f3f0ea;border-color:#e6ddcd;color:#7a6a45}
.tbadge.listings{background:#eaf3ee;border-color:#d3e6dc;color:#3f7457}

.due{font-weight:600;font-size:13px;color:var(--ink-2);white-space:nowrap}
.due .pill{display:inline-block;padding:3px 9px;border-radius:7px;font-size:12px}
.due.over .pill{background:var(--red-soft);color:var(--red)}
.due.soon .pill{background:var(--amber-soft);color:var(--amber)}
.due.ok .pill{background:var(--sage-soft);color:var(--sage-800)}
.due.none{color:var(--muted);font-weight:500;font-style:italic;font-size:12px}

.links{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.lk{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);display:grid;place-items:center;color:var(--ink-2);background:var(--paper);transition:.12s;text-decoration:none}
.lk:hover{border-color:var(--sage);color:var(--sage-800);background:var(--sage-tint)}
.lk svg{width:15px;height:15px}
.lk.off{opacity:.28;pointer-events:none}

.ptitle{font-weight:600;color:var(--ink);font-size:13px;margin-bottom:3px;line-height:1.3}
.notes{color:var(--ink-2);font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notes.empty{color:var(--muted);font-style:italic;opacity:.6}

.rowacts{display:flex;gap:4px;justify-content:flex-end}
.ic{width:30px;height:30px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);display:grid;place-items:center;transition:.12s}
.ic:hover{background:var(--line);color:var(--ink)}
.ic.del:hover{background:var(--red-soft);color:var(--red)}
.ic svg{width:15px;height:15px}

.empty{padding:46px 20px;text-align:center;color:var(--muted)}
.empty .eb{font-family:"Outfit";font-weight:600;color:var(--ink-2);font-size:15px;margin-bottom:4px}

.completed-sec{margin-top:30px}
.comp-toggle{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;padding:8px 2px;color:var(--muted);font-weight:600;font-size:13px}
.comp-toggle:hover{color:var(--ink-2)}
.comp-toggle .chev{transition:transform .18s}
.comp-toggle.open .chev{transform:rotate(90deg)}
.comp-toggle .gline{flex:1;height:1px;background:var(--line)}
.comp-body{display:none;margin-top:10px}
.comp-body.open{display:block}

.scrim{position:fixed;inset:0;background:rgba(28,33,31,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:40px 16px;overflow:auto}
.scrim.open{display:flex}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .18s ease}
.modal.wide{max-width:740px}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.mh h2{font-family:"Outfit";font-weight:700;font-size:17px;margin:0;letter-spacing:.01em}
.mb{padding:20px 22px;max-height:66vh;overflow:auto}
.mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--canvas)}
.x{border:none;background:transparent;color:var(--muted);width:32px;height:32px;border-radius:8px;display:grid;place-items:center}
.x:hover{background:var(--line);color:var(--ink)}
.x svg{width:18px;height:18px}

.frow{margin-bottom:15px}
.frow label{display:block;font-weight:600;font-size:12px;color:var(--ink-2);margin-bottom:6px;letter-spacing:.02em}
.frow label .opt{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
.inp{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:10px 12px;color:var(--ink);background:var(--paper);transition:.12s}
.inp:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}
textarea.inp{resize:vertical;min-height:64px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.typepick{display:flex;gap:7px;flex-wrap:wrap}
.tp{border:1px solid var(--line-2);background:var(--paper);padding:8px 13px;border-radius:9px;font-weight:600;font-size:13px;color:var(--ink-2)}
.tp:hover{border-color:var(--sage)}
.tp.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.hint{font-size:12px;color:var(--muted);margin-top:5px}
.hidden{display:none!important}

.cl-add{display:grid;grid-template-columns:1fr 92px 1fr 40px;gap:9px;align-items:end;background:var(--sage-tint);padding:13px;border-radius:11px;margin-bottom:14px}
.cl-add .frow{margin:0}
.cl-list{border:1px solid var(--line);border-radius:11px;overflow:hidden}
.cl-item{display:grid;grid-template-columns:62px 1fr 1fr 36px;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
.cl-item:last-child{border-bottom:none}
.cl-item:nth-child(even){background:var(--canvas)}
.cl-item .abbr{justify-self:start}
.cl-item .cn{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-item select{border:1px solid var(--line-2);border-radius:8px;padding:6px 8px;background:var(--paper);font-weight:600;font-size:13px}
.search{position:relative;margin-bottom:12px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search input{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:9px 12px 9px 34px}
.search input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:980px){
  .row,.head-row{grid-template-columns:34px minmax(0,1.3fr) 96px minmax(0,1.5fr) 62px;gap:9px}
  .row .due,.head-row .h-due{display:none}
  .row .type-cell,.head-row .h-type{display:none}
  .wrap{padding:14px}
  .f2,.cl-add{grid-template-columns:1fr}
  .stat{min-width:46%}
}
.search-ctl{position:relative;display:flex;align-items:center}
.search-ctl svg{position:absolute;left:10px;width:15px;height:15px;color:var(--muted);pointer-events:none}
.search-ctl input{border:1px solid var(--line-2);background:var(--paper);border-radius:9px;padding:8px 12px 8px 32px;width:210px;color:var(--ink);transition:.14s}
.search-ctl input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}
.btn.icon-only{padding:8px 10px}
.btn.icon-only svg{width:16px;height:16px}
.cal-seg{display:flex;gap:3px;background:var(--canvas);padding:3px;border-radius:9px;border:1px solid var(--line)}
.cseg{border:none;background:transparent;padding:5px 11px;border-radius:7px;font-weight:600;font-size:12px;color:var(--ink-2)}
.cseg:hover{color:var(--ink)}
.cseg.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
.cal-head .spacer{flex:1}
.cal-grid.week{grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr}
.cal-cell.week{min-height:240px}
.cal-daylabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.cal-daylabel b{color:var(--ink);font-size:15px}
.cal-cell.drag-over{background:var(--sage-soft);outline:2px dashed var(--sage);outline-offset:-3px}
.cchip[draggable="true"]{cursor:grab}
.cchip.dragging{opacity:.4}
.cchip.u-over{background:var(--red-soft);color:var(--red)}
.cchip.u-soon{background:#fbf0e6;color:var(--amber)}
.cchip.u-week{background:var(--sage-soft);color:var(--sage-800)}
.cchip.u-later{background:#eef1f5;color:#4a5878}
.cchip.u-none{background:#f1f2f1;color:var(--muted)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:18px}
.card.wide{grid-column:1/-1}
.card-h{font-family:"Outfit";font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);margin-bottom:14px}
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:8px}
.lg{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);font-weight:500}
.lg b{color:var(--ink);margin-left:4px;font-family:"Outfit"}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block;flex-shrink:0}
.donut-num{fill:var(--ink);font-family:"Outfit";font-weight:700;font-size:24px}
.donut-lbl{fill:var(--muted);font-family:"DM Sans";font-weight:600;font-size:9px;letter-spacing:.14em}
.bar-num{fill:var(--ink);font-family:"Outfit";font-weight:700;font-size:13px}
.bar-lbl{fill:var(--muted);font-family:"DM Sans";font-weight:600;font-size:11px}
.bar-lbl.strong{fill:var(--ink);font-weight:700}
@media(max-width:760px){.dash-grid{grid-template-columns:1fr}.cal-cell.week{min-height:200px}.search-ctl input{width:150px}}
[data-theme="dark"]{--sage-soft:#243430;--sage-tint:#1c2624;--sage-800:#aecbc5;--ink:#e9edeb;--ink-2:#aeb6b3;--muted:#7c8481;--paper:#1b1f22;--canvas:#131618;--line:#262b2e;--line-2:#333a3d;--red-soft:#3a221d;--amber-soft:#37291a;--shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.45);--shadow-lg:0 12px 40px rgba(0,0,0,.6)}
[data-theme="dark"] .abbr{background:var(--ink);color:#14171a}
[data-theme="dark"] .btn.primary{background:var(--sage);color:#14171a;border-color:var(--sage)}
[data-theme="dark"] .btn.primary:hover{background:var(--sage-700);border-color:var(--sage-700)}
[data-theme="dark"] .tab.master.active{background:var(--sage);color:#14171a}
[data-theme="dark"] .tab.master.active .ct{background:#14171a;color:var(--sage)}
[data-theme="dark"] .cb:checked::after{border-color:#14171a}
[data-theme="dark"] .catb,[data-theme="dark"] .tbadge{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:var(--ink-2)}
[data-theme="dark"] .due.over .pill{background:#3a221d;color:#e9a594}
[data-theme="dark"] .due.soon .pill{background:#37291a;color:#e0b072}
[data-theme="dark"] .due.ok .pill{background:#243430;color:#aecbc5}
[data-theme="dark"] .cchip.daily{background:#22302d;color:#bcd6d0}
[data-theme="dark"] .cchip.longform{background:#222a38;color:#aebfe0}
[data-theme="dark"] .cchip.clips{background:#2f2230;color:#d6aecb}
[data-theme="dark"] .cchip.batch{background:#302c22;color:#d8c79a}
[data-theme="dark"] .cchip.listings{background:#22302a;color:#a9d9bd}
[data-theme="dark"] .cchip.u-over{background:#3a221d;color:#e9a594}
[data-theme="dark"] .cchip.u-soon{background:#37291a;color:#e0b072}
[data-theme="dark"] .cchip.u-week{background:#243430;color:#aecbc5}
[data-theme="dark"] .cchip.u-later{background:#222a38;color:#aebfe0}
[data-theme="dark"] .cchip.u-none{background:rgba(255,255,255,.07);color:var(--muted)}
.nhead{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.nhead .ptitle{margin:0}
.ava{width:22px;height:22px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;font-family:"Outfit";display:inline-grid;place-items:center;flex-shrink:0;letter-spacing:.02em;text-transform:capitalize}
.pagenav{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:4px;background:#1b1f23;border:1px solid #2c3137;border-radius:16px;padding:6px;box-shadow:0 10px 34px rgba(0,0,0,.32);z-index:40}
.pnav{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:#99a3a0;padding:8px 20px;border-radius:11px;font-weight:600;font-size:11px;letter-spacing:.02em;min-width:76px;transition:.14s}
.pnav svg{width:20px;height:20px}
.pnav:hover{color:#e8ecea;background:rgba(255,255,255,.06)}
.pnav.active{background:var(--sage);color:#10201d}
.cal-nodate{margin-bottom:4px}
.fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:90;display:none}
.fx-canvas.show{display:block}
.fx-banner{position:fixed;left:50%;top:30%;transform:translate(-50%,-50%) scale(.82);background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow-lg);border-radius:18px;padding:20px 30px;font-family:"Outfit";font-weight:700;font-size:22px;color:var(--ink);z-index:91;opacity:0;transition:.32s cubic-bezier(.2,.9,.3,1.2);pointer-events:none;text-align:center}
.fx-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.fx-banner small{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-top:5px;letter-spacing:.01em}
.catb,.tbadge{display:inline-flex;align-items:center;gap:6px;background:var(--canvas);border:1px solid var(--line);color:var(--ink-2);font-weight:600;font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.tbadge{font-family:"Outfit";letter-spacing:.02em;text-transform:none}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.cchip.ctype{color:var(--ink);background:var(--canvas)}
.settings{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.set-card{padding:18px}
.set-wide{grid-column:1/-1}
.set-add{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.set-add .inp{flex:1;min-width:130px}
.set-list{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.set-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-row:nth-child(even){background:var(--canvas)}
.swatch{width:30px;height:30px;border:1px solid var(--line-2);border-radius:7px;padding:0;background:none;cursor:pointer;flex-shrink:0}
.set-name{font-weight:600;flex:1}
.set-inp{flex:1;padding:7px 10px}
.set-used{font-size:12px;color:var(--muted);white-space:nowrap}
.set-due{font-size:12px;color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
.set-count{font-size:12px;color:var(--muted);font-weight:600;background:var(--canvas);border:1px solid var(--line);border-radius:20px;padding:1px 9px;margin-left:6px}
.ic.del[disabled]{opacity:.25;pointer-events:none}
@media(max-width:860px){.settings{grid-template-columns:1fr}}
/* ---------- mobile ---------- */
@media(max-width:720px){
  body{overflow-x:hidden}
  .topbar{padding:10px 14px;gap:9px}
  .brand .b2{display:none}
  .topbar .btn{padding:8px 11px;font-size:12px}
  .topbar .btn.primary svg{margin:0}
  .controls{position:static;top:auto;padding:10px 14px;gap:8px}
  .tabs{overflow-x:auto;max-width:100%;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto}
  .search-ctl{flex:1 1 100%;order:5}
  .search-ctl input{width:100%}
  .search-ctl input:focus{width:100%}
  .field{flex:1 1 44%}
  .field .sel{width:100%}
  .syncbar{padding:7px 14px}
  .wrap{padding:14px 14px 92px}
  .cal-head{flex-wrap:wrap;gap:8px}
  .cal-head .spacer{display:none}
  .cal-head h3{flex:1 1 100%;font-size:15px}
  .cal-cell{min-height:74px}
  .modal{max-width:100%}
  .scrim{padding:14px 10px}
  .donut-wrap{gap:14px}
  .pagenav{left:8px;right:8px;bottom:10px;transform:none;justify-content:center;border-radius:14px;overflow-x:auto;scrollbar-width:none}
  .pagenav::-webkit-scrollbar{display:none}
  .pnav{min-width:0;padding:7px 14px;font-size:10px;flex:0 0 auto}
}
@media(max-width:420px){
  .pnav span{display:none}
  .pnav{padding:9px 14px}
  .field{flex:1 1 100%}
  .topbar .b1{font-size:12px}
}
.set-hint{font-size:12px;color:var(--muted);white-space:normal;line-height:1.4}
@media(max-width:720px){
  .set-card{padding:14px}
  .set-add{gap:8px}
  .set-add .inp{flex:1 1 100%;min-width:0}
  .set-add .btn{flex:1 1 auto;justify-content:center}
  .set-add .swatch{flex:0 0 auto}
  .set-add .set-due{flex:1 1 100%}
  .set-row{flex-wrap:wrap;gap:8px 10px}
  .set-inp{flex:1 1 60%}
  .set-name{flex:1 1 50%}
  .set-due{flex:1 1 100%;order:6}
  .set-used{flex:1 1 auto;white-space:normal;text-align:left}
  .set-hint{flex:1 1 100%}
  .set-row .ic.del{margin-left:auto}
  .cl-item{grid-template-columns:52px 1fr 108px 30px;gap:8px}
  .cl-item .cn{font-size:13px}
}
.fab{position:fixed;right:26px;bottom:26px;z-index:50;display:inline-flex;align-items:center;gap:9px;height:56px;padding:0 24px;border:none;border-radius:30px;background:var(--sage);color:#10201d;font-family:"Outfit",system-ui,sans-serif;font-weight:700;font-size:15px;letter-spacing:.01em;cursor:pointer;box-shadow:0 10px 30px rgba(28,33,31,.28);transition:transform .16s ease, box-shadow .16s ease, background .16s ease}
.fab svg{width:22px;height:22px;flex:0 0 auto}
.fab:hover{transform:translateY(-2px) scale(1.03);background:#9fb6b2;box-shadow:0 16px 42px rgba(28,33,31,.34)}
.fab:active{transform:translateY(0) scale(.99)}
[data-theme="dark"] .fab{box-shadow:0 12px 34px rgba(0,0,0,.45)}
@media(max-width:640px){
  .fab{right:16px;bottom:84px;height:52px;padding:0 20px;font-size:14px}
  .fab svg{width:20px;height:20px}
}
@media(min-width:981px){.cal{min-height:calc(100vh - 252px)}}
.seg-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-left:6px}
.cal-legend{display:flex;flex-wrap:wrap;align-items:center;gap:7px 16px;padding:9px 16px;border-bottom:1px solid var(--line);background:var(--canvas);flex:0 0 auto}
.cal-legend .lg-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.cal-legend .lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2)}
.cal-legend .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
@media(max-width:640px){.cal-legend{gap:6px 12px;padding:8px 12px}.cal-legend .lg{font-size:11px}.seg-label{display:none}}
.stat.clickable{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
.stat.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--sage)}
.qbanner{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-2);background:var(--sage-tint);border:1px solid var(--line);border-radius:10px;padding:9px 14px;margin-bottom:12px}
.qbanner b{color:var(--ink)}
.qbanner .qclear{margin-left:auto;border:1px solid var(--line-2);background:var(--paper);color:var(--ink);border-radius:8px;padding:5px 12px;font-weight:600;font-size:12px;cursor:pointer}
.qbanner .qclear:hover{border-color:var(--sage);background:var(--sage-tint)}
.card.statbig{display:flex;flex-direction:column}
.card.statbig .bigwrap{flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px}
.card.statbig .bignum{font-family:"Outfit";font-weight:700;font-size:52px;line-height:1;color:var(--sage-800)}
.card.statbig .bigbar{width:128px;height:14px;border-radius:8px;background:var(--sage);opacity:.55}
.card.statbig .bigsub{font-size:13px;color:var(--muted);font-weight:600}
.cal-cell[data-date]{cursor:pointer}
.cal-cell[data-date]:hover{background:var(--sage-tint)}
.cal-cell.other[data-date]:hover{background:var(--sage-tint)}
@media(min-width:981px){.dash{min-height:calc(100vh - 252px)}.dash-grid .card{min-height:232px}.donut-wrap svg{width:176px;height:176px}}
.daily-split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.daily-col .dc-head{display:flex;align-items:center;gap:8px;margin:0 2px 9px;font-family:"Outfit";font-weight:700;font-size:14px;color:var(--ink)}
.daily-col .dc-count{font-size:12px;font-weight:700;color:var(--ink-2);background:var(--sage-tint);border-radius:20px;padding:1px 10px}
.daily-col .dc-empty{background:var(--paper);border:1px dashed var(--line-2);border-radius:13px;padding:28px 16px;text-align:center;color:var(--muted);font-weight:600;font-size:13px}
.daily-split .tbl.compact .row,.daily-split .tbl.compact .head-row{grid-template-columns:32px minmax(0,1.1fr) 88px minmax(0,1.4fr) 58px;gap:10px;padding:10px 14px}
.daily-split .tbl.compact .cat-cell,.daily-split .tbl.compact .h-cat,.daily-split .tbl.compact .type-cell,.daily-split .tbl.compact .h-type{display:none}

async function initFirebase(){
  setSyncStatus("connecting");
  try{
    const appMod=await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    const fsMod=await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");
    FBSDK=fsMod;
    const {getFirestore,collection,onSnapshot,getDocs,doc,writeBatch}=fsMod;
    const app=appMod.initializeApp(FIREBASE_CONFIG); db=getFirestore(app); fbReady=true;
    const snap=await getDocs(collection(db,"clients"));
    if(snap.empty){const b=writeBatch(db);SEED_CLIENTS.forEach(c=>b.set(doc(db,"clients",c.abbr),c));await b.commit();}
    const cfg=await getDocs(collection(db,"config")), have=new Set(cfg.docs.map(d=>d.id));
    const seeds={editors:EDITORS_LIST,categories:CATEGORIES,types:TYPES};
    for(const k of Object.keys(seeds)){if(!have.has(k))await FBSDK.setDoc(doc(db,"config",k),{list:seeds[k]});}
    onSnapshot(collection(db,"config"),s=>{
      s.docs.forEach(d=>{const list=(d.data()||{}).list;if(!list)return;if(d.id==="editors")applyConfig({editors:list});else if(d.id==="categories")applyConfig({categories:list});else if(d.id==="types")applyConfig({types:list});});
      rebuildConfigUI();ensureDailyDue();setSyncStatus("ok");refreshUI();
    },()=>setSyncStatus("err"));
    onSnapshot(collection(db,"clients"),s=>{state.clients=s.docs.map(d=>d.data());setSyncStatus("ok");refreshUI();},()=>setSyncStatus("err"));
    onSnapshot(collection(db,"tasks"),s=>{state.tasks=s.docs.map(d=>d.data());setSyncStatus("ok");refreshUI();rollDailies();},()=>setSyncStatus("err"));
  }catch(e){console.error("Firebase error:",e);setSyncStatus("err");fbReady=false;initLocal();}
}
async function ensureDailyDue(){
  const d=TYPES.find(t=>t.id==="daily");
  if(d&&d.due===false){d.due=true;rebuildTypeMaps();rebuildConfigUI();try{await backend.saveTypes();}catch(e){}}
}
async function rollDailies(){
  const dt=TYPES.find(t=>t.id==="daily"); if(!dt||!dt.due)return;
  const today=todayStr();
  const stale=state.tasks.filter(t=>t.type==="daily"&&!t.completed&&t.dueDate&&t.dueDate<today);
  if(!stale.length)return;
  for(const t of stale){await backend.upsertTask({...t,dueDate:today});}
  refreshUI();
}

/* ============ helpers ============ */
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const clientByAbbr=a=>state.clients.find(c=>c.abbr===a);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dueInfo(ds){
  if(!ds)return null;
  const today=new Date(todayStr()+"T00:00:00"),due=new Date(ds+"T00:00:00");
  const days=Math.round((due-today)/86400000);let cls="ok",label;
  if(days<0){label=`${-days}d overdue`;cls="over";}
  else if(days===0){label="Today";cls="soon";}
  else if(days===1){label="Tomorrow";cls="soon";}
  else if(days<=6){label=`${days} days`;cls=days<=3?"soon":"ok";}
  else label=new Date(ds+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"});
  return {days,label,cls};
}
function refreshUI(){render();}
function matchesSearch(t){
  const q=state.search.trim().toLowerCase();if(!q)return true;
  const c=clientByAbbr(t.clientAbbr)||{};
  return [c.name,c.abbr,t.projectName,t.notes].some(v=>(v||"").toLowerCase().includes(q));
}

/* ============ filter & sort ============ */
function passCat(t){if(state.cat==="all")return true;const c=clientByAbbr(t.clientAbbr);return c&&c.cat===state.cat;}
function passAsg(t){if(state.assignee==="all")return true;if(state.assignee==="__none")return !t.assignee;return t.assignee===state.assignee;}
function urg(t){return t.dueDate?new Date(t.dueDate).getTime():Infinity;}
function sortTasks(arr){
  const a=arr.slice();const name=t=>clientByAbbr(t.clientAbbr)?.name||t.clientAbbr;
  const cat=t=>clientByAbbr(t.clientAbbr)?.cat||"zzz";
  if(state.sort==="client")a.sort((x,y)=>name(x).localeCompare(name(y)));
  else if(state.sort==="added")a.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  else if(state.sort==="type")a.sort((x,y)=>(TYPE_ORDER[x.type]-TYPE_ORDER[y.type])||(urg(x)-urg(y)));
  else if(state.sort==="category")a.sort((x,y)=>catLabel(cat(x)).localeCompare(catLabel(cat(y)))||name(x).localeCompare(name(y)));
  else if(state.sort==="assignee")a.sort((x,y)=>(x.assignee||"~").localeCompare(y.assignee||"~")||name(x).localeCompare(name(y)));
  else a.sort((x,y)=>(urg(x)-urg(y))||(x.createdAt||0)-(y.createdAt||0));
  return a;
}

/* ============ render ============ */
function render(){
  updateCounts();
  const ctrls=document.querySelector(".controls");
  if(ctrls)ctrls.style.display=(state.view==="dashboard"||state.view==="settings")?"none":"";
  const board=$("#board"),statsEl=$("#stats");
  const pool=state.tasks.filter(t=>passCat(t)&&passAsg(t)&&matchesSearch(t)&&(state.tab==="master"||t.type===state.tab));
  const activeRaw=pool.filter(t=>!t.completed);
  const active=sortTasks(activeRaw);
  statsEl.innerHTML=(state.tab==="master"&&state.view==="list")?statsStrip(activeRaw,pool.filter(t=>t.completed).length):"";
  const compSec=document.querySelector(".completed-sec");
  if(compSec)compSec.style.display=(state.view==="list"&&state.quick!=="completed")?"":"none";
  if(state.view==="settings"){board.innerHTML=settingsHTML();bindSettings(board);}
  else if(state.view==="dashboard"){board.innerHTML=dashboardHTML();}
  else if(state.view==="calendar"){board.innerHTML=calendarHTML(activeRaw);bindCalendar(board);}
  else if(state.view==="list"&&state.tab==="daily"){
    board.innerHTML=dailySplitHTML(active);bindRows(board);
  }
  else{
    let rows=active,qlabel=null;
    if(state.tab==="master"&&state.quick){
      if(state.quick==="overdue"){rows=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days<0);qlabel="Overdue";}
      else if(state.quick==="due7"){rows=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days>=0&&dueInfo(t.dueDate).days<=6);qlabel="Due within 7 days";}
      else if(state.quick==="completed"){rows=pool.filter(t=>t.completed).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));qlabel="Completed";}
    }
    const banner=qlabel?`<div class="qbanner">Showing <b>${qlabel}</b> · ${rows.length}<button class="qclear" type="button">Clear filter</button></div>`:"";
    board.innerHTML=banner+(rows.length?tableHTML(rows):emptyHTML());
    bindRows(board);
    const qc=board.querySelector(".qclear");if(qc)qc.onclick=()=>{state.quick=null;render();};
  }
  const done=pool.filter(t=>t.completed).sort((x,y)=>(y.completedAt||0)-(x.completedAt||0));
  $("#compLabel").textContent=`Completed (${done.length})`;
  const cb=$("#compBody");
  cb.innerHTML=done.length?tableHTML(done):`<div class="empty"><div>Nothing completed yet.</div></div>`;
  bindRows(cb);
}
function statsStrip(active,doneCount){
  const over=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days<0).length;
  const soon=active.filter(t=>TYPE_MAP[t.type].due&&t.dueDate&&dueInfo(t.dueDate).days>=0&&dueInfo(t.dueDate).days<=6).length;
  const dailies=active.filter(t=>t.type==="daily").length;
  return `<div class="stats">
    <div class="stat clickable" data-stat="active"><div class="sv">${active.length}</div><div class="sl">Active in pipeline</div></div>

function urgClass(t){const di=TYPE_MAP[t.type]?.due?dueInfo(t.dueDate):null;if(!di)return"u-none";if(di.days<0)return"u-over";if(di.days<=3)return"u-soon";if(di.days<=6)return"u-week";return"u-later";}

function nodateStrip(nodate){return nodate.length?`<div class="cal-nodate"><span class="lbl">No date / dailies</span>${nodate.map(calChip).join("")}</div>`:"";}
function calendarHTML(tasks){
  const dated={}, nodate=[];

  const todayLocal=ymd(new Date());
  const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  if(state.calMode==="week"){
    const ws=state.calWeek;
    const end=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+6);
    const title=`${ws.toLocaleDateString(undefined,{month:"short",day:"numeric"})} – ${end.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}`;
    let cells="";
    for(let i=0;i<7;i++){
      const d=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+i);

  }

  const title=month.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const startDay=new Date(y,m,1).getDay();
  const start=new Date(y,m,1-startDay);
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);

function bindCalendar(scope){

function lastWeekPct(){
  const today=new Date();today.setHours(0,0,0,0);
  const dow=(today.getDay()+6)%7;
  const thisMon=new Date(today.getFullYear(),today.getMonth(),today.getDate()-dow);
  const prevMon=new Date(thisMon.getFullYear(),thisMon.getMonth(),thisMon.getDate()-7);
  const ds=ymd(prevMon),de=ymd(thisMon);
  const due=state.tasks.filter(t=>TYPE_MAP[t.type]&&TYPE_MAP[t.type].due&&t.dueDate&&t.dueDate>=ds&&t.dueDate<de);
  const done=due.filter(t=>t.completed).length;
  return {pct:due.length?Math.round(done/due.length*100):null,done,total:due.length};
}
function completedLineData(){
  const START=new Date(2026,5,1);START.setHours(0,0,0,0);
  const now=Date.now(),pts=[];
  for(let i=0;i<52;i++){
    const sd=new Date(START.getFullYear(),START.getMonth(),START.getDate()+i*7);
    const ed=new Date(sd.getFullYear(),sd.getMonth(),sd.getDate()+7);
    const value=state.tasks.filter(t=>t.completed&&t.completedAt&&t.completedAt>=sd.getTime()&&t.completedAt<ed.getTime()).length;
    pts.push({date:sd,value,current:now>=sd.getTime()&&now<ed.getTime()});
  }
  return pts;
}
function lineSVG(points){
  const W=1040,H=240,padL=34,padR=18,padT=18,padB=36,n=points.length;
  const max=Math.max(1,...points.map(p=>p.value)),ix=W-padL-padR,iy=H-padT-padB;
  const X=i=>padL+(n<=1?0:ix*i/(n-1)),Y=v=>padT+iy*(1-v/max);
  const ticks=[...new Set([0,Math.ceil(max/2),max])];
  const grid=ticks.map(v=>`<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${W-padR}" y2="${Y(v).toFixed(1)}" stroke="var(--line)" stroke-width="1"/><text x="${padL-8}" y="${(Y(v)+4).toFixed(1)}" text-anchor="end" class="bar-lbl">${v}</text>`).join("");
  const line=points.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ");
  const area=`M${X(0).toFixed(1)} ${Y(0).toFixed(1)} `+points.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ")+` L${X(n-1).toFixed(1)} ${Y(0).toFixed(1)} Z`;
  const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let lastM=-1;const xl=points.map((p,i)=>{const m=p.date.getMonth();if(m!==lastM){lastM=m;return `<line x1="${X(i).toFixed(1)}" y1="${padT}" x2="${X(i).toFixed(1)}" y2="${H-padB}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 3"/><text x="${X(i).toFixed(1)}" y="${H-12}" text-anchor="middle" class="bar-lbl">${MON[m]}${m===0?" "+p.date.getFullYear():""}</text>`;}return "";}).join("");
  const ci=points.findIndex(p=>p.current);
  const marker=ci>=0?`<circle cx="${X(ci).toFixed(1)}" cy="${Y(points[ci].value).toFixed(1)}" r="4.5" fill="var(--sage)" stroke="var(--paper)" stroke-width="2"/>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMidYMid meet">${grid}${xl}<path d="${area}" fill="rgba(146,171,167,.14)" stroke="none"/><path d="${line}" fill="none" stroke="var(--sage)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${marker}</svg>`;
}
function upcomingLoadData(){
  const today=new Date();today.setHours(0,0,0,0);const out=[];
  for(let i=0;i<14;i++){
    const d=new Date(today.getFullYear(),today.getMonth(),today.getDate()+i),ds=ymd(d);
    const value=state.tasks.filter(t=>!t.completed&&TYPE_MAP[t.type]&&TYPE_MAP[t.type].due&&t.dueDate===ds).length;
    out.push({label:(d.getMonth()+1)+"/"+d.getDate(),value,isToday:i===0,weekend:d.getDay()===0||d.getDay()===6});
  }
  return out;
}
function onTimeRate(){
  const now=new Date(),mStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const done=state.tasks.filter(t=>t.completed&&t.completedAt&&t.completedAt>=mStart&&TYPE_MAP[t.type]&&TYPE_MAP[t.type].due&&t.dueDate);
  if(!done.length)return {pct:null,onTime:0,total:0};
  const onTime=done.filter(t=>{const c=new Date(t.completedAt);return ymd(new Date(c.getFullYear(),c.getMonth(),c.getDate()))<=t.dueDate;}).length;
  return {pct:Math.round(onTime/done.length*100),onTime,total:done.length};
}
function miniBars(items){
  const W=1040,H=190,pad=30,n=items.length,iy=H-pad-30,max=Math.max(1,...items.map(d=>d.value));
  const slot=(W-pad*2)/n,bw=Math.min(46,slot*0.62);
  const bars=items.map((d,i)=>{
    const x=pad+i*slot+(slot-bw)/2,bh=iy*(d.value/max),y=H-30-bh;
    const fill=d.weekend?"#c2d0cd":"var(--sage)",out=d.isToday?' stroke="var(--sage-800)" stroke-width="2"':"";
    const num=d.value?`<text x="${(x+bw/2).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" class="bar-num">${d.value}</text>`:"";
    const lbl=`<text x="${(x+bw/2).toFixed(1)}" y="${H-10}" text-anchor="middle" class="bar-lbl ${d.isToday?"strong":""}">${d.label}</text>`;
    return `<g><rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,2).toFixed(1)}" rx="5" fill="${fill}"${out}/>${num}${lbl}</g>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}
function donutSVG(data){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return `<div class="empty" style="padding:34px 10px">No active entries.</div>`;
  const R=54,C=2*Math.PI*R;let off=0;
  const segs=data.map(d=>{const len=d.value/total*C;const s=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${d.color}" stroke-width="22" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 70 70)"/>`;off+=len;return s;}).join("");
  const legend=data.map(d=>`<div class="lg"><span class="dot" style="background:${d.color}"></span>${esc(d.label)}<b>${d.value}</b></div>`).join("");
  return `<div class="donut-wrap"><svg viewBox="0 0 140 140" width="148" height="148"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--line)" stroke-width="22"/>${segs}<text x="70" y="66" text-anchor="middle" class="donut-num">${total}</text><text x="70" y="84" text-anchor="middle" class="donut-lbl">ACTIVE</text></svg><div class="legend">${legend}</div></div>`;
}
function barsSVG(weeks){
  const max=Math.max(1,...weeks.map(w=>w.value)),W=560,H=170,pad=30,n=weeks.length,bw=48,gap=(W-pad*2-bw*n)/(n-1||1);
  const bars=weeks.map((w,i)=>{const x=pad+i*(bw+gap),h=(H-pad-24)*(w.value/max),y=H-24-h;return `<g><rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(h,1).toFixed(1)}" rx="6" fill="var(--sage)"/><text x="${(x+bw/2).toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" class="bar-num">${w.value}</text><text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" class="bar-lbl">${w.label}</text></g>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

function isAfter3ET(){
  try{const h=parseInt(new Date().toLocaleString("en-US",{timeZone:"America/New_York",hour:"2-digit",hour12:false}),10);return h>=15;}
  catch(e){return new Date().getHours()>=15;}
}
let fxToken=0, fxBannerTimer=null;
function celebrate(){
  const cv=$("#fxCanvas"),banner=$("#fxBanner");
  if(!cv||!banner)return;
  const token=++fxToken;
  cv.classList.add("show");banner.classList.add("show");
  if(fxBannerTimer)clearTimeout(fxBannerTimer);
  fxBannerTimer=setTimeout(()=>{if(token===fxToken)banner.classList.remove("show");},4400);
  const ctx=cv.getContext("2d"),dpr=window.devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  const colors=["#92ABA7","#b97f8e","#6b7fa8","#6fa37f","#c8893c","#e7ecea","#7a6aa8"];
  let parts=[],start=performance.now(),last=start,spawn=0;
  function burst(x,y){const col=colors[Math.floor(Math.random()*colors.length)];for(let i=0;i<70;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*4.5;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:Math.random()<0.5?col:colors[Math.floor(Math.random()*colors.length)]});}}
  function frame(now){
    if(token!==fxToken)return;
    const dt=Math.min(34,now-last);last=now;
    ctx.clearRect(0,0,innerWidth,innerHeight);
    spawn-=dt;
    if(spawn<=0&&now-start<3600){spawn=300;burst(innerWidth*(0.15+Math.random()*0.7),innerHeight*(0.18+Math.random()*0.4));}
    parts.forEach(p=>{p.vy+=0.045;p.x+=p.vx;p.y+=p.vy;p.life-=0.012;});
    parts=parts.filter(p=>p.life>0);
    parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,3,0,7);ctx.fill();});
    ctx.globalAlpha=1;
    if(now-start<5200||parts.length)requestAnimationFrame(frame);

async function toggleDone(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const wasOpen=!t.completed, today=todayStr();
  const wasDueToday = wasOpen && t.type==="daily" && t.dueDate===today;
  await backend.upsertTask({...t,completed:!t.completed,completedAt:!t.completed?Date.now():null});

}

function csvEscape(v){v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function toCSV(headers,rows){return [headers.join(","),...rows.map(r=>r.map(csvEscape).join(","))].join("\r\n");}
function parseCSV(text){
  const s=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");const rows=[];let i=0,field="",row=[],inQ=false;
  while(i<s.length){const ch=s[i];
    if(inQ){if(ch==='"'){if(s[i+1]==='"'){field+='"';i+=2;continue;}inQ=false;i++;continue;}field+=ch;i++;continue;}
    if(ch==='"'){inQ=true;i++;continue;}
    if(ch===","){row.push(field);field="";i++;continue;}
    if(ch==="\n"){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=ch;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==""));
}
function exportCSV(){
  const headers=["ID","Type","ClientAbbr","ClientName","ProjectName","Editor","DueDate","Status","ProjectURL","FootageURL","AudioURL","Notes"];
  const rows=state.tasks.filter(t=>!t.completed).map(t=>{const c=clientByAbbr(t.clientAbbr)||{};return [t.id,(TYPE_MAP[t.type]?.label||t.type),t.clientAbbr,c.name||"",t.projectName||"",t.assignee||"",t.dueDate||"","Active",t.projectUrl||"",t.footageUrl||"",t.audioUrl||"",t.notes||""];});
  const blob=new Blob([toCSV(headers,rows)],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download=`anomaly-pipeline-${todayStr()}.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast(`Exported ${rows.length} active project${rows.length===1?"":"s"}`);
}
async function importCSV(file){
  if(!file)return;
  let text; try{text=await file.text();}catch(e){toast("Couldn't read file");return;}
  const rows=parseCSV(text); if(rows.length<2){toast("Nothing to import");return;}
  const head=rows[0].map(h=>h.trim().toLowerCase()), idx=n=>head.indexOf(n);
  const col={id:idx("id"),type:idx("type"),abbr:idx("clientabbr")>=0?idx("clientabbr"):idx("client"),name:idx("clientname"),proj:idx("projectname"),ed:idx("editor"),due:idx("duedate"),status:idx("status"),purl:idx("projecturl"),furl:idx("footageurl"),aurl:idx("audiourl"),notes:idx("notes")};
  if(col.abbr<0){toast("CSV needs a ClientAbbr column");return;}
  let added=0,updated=0,skipped=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r],g=i=>(i>=0&&i<row.length)?String(row[i]).trim():"";
    const abbr=g(col.abbr).toUpperCase(); if(!abbr){skipped++;continue;}
    const tl=g(col.type),lc=tl.toLowerCase();
    const found=TYPES.find(tp=>tp.id===lc||tp.label.toLowerCase()===lc||slug(tp.label)===slug(tl));
    const typeId=found?found.id:(TYPES[0]&&TYPES[0].id); if(!typeId){skipped++;continue;}
    const usesDue=TYPE_MAP[typeId]&&TYPE_MAP[typeId].due;
    let due=g(col.due)||null; if(due&&!/^\d{4}-\d{2}-\d{2}$/.test(due)){const d=new Date(due);due=isNaN(+d)?null:ymd(d);} if(!usesDue)due=null;
    if(!clientByAbbr(abbr)){const nm=g(col.name)||abbr;const ck=(CATEGORIES.find(c=>c.key==="misc")||CATEGORIES[0]||{}).key||"misc";await backend.upsertClient({name:nm,abbr,cat:ck});}
    const completed=/complete|done/i.test(g(col.status));
    const id=g(col.id)||("t"+Date.now()+Math.random().toString(36).slice(2,6));
    const existing=state.tasks.find(x=>x.id===id);
    await backend.upsertTask({id,type:typeId,clientAbbr:abbr,projectName:g(col.proj),assignee:g(col.ed),dueDate:due,projectUrl:g(col.purl),footageUrl:g(col.furl),audioUrl:g(col.aurl),notes:g(col.notes),completed,completedAt:completed?((existing&&existing.completedAt)||Date.now()):null,createdAt:existing?existing.createdAt:Date.now()});
    existing?updated++:added++;
  }
  render();
  toast(`Imported ${added} new, ${updated} updated${skipped?`, ${skipped} skipped`:""}`);
}

  scope.querySelectorAll(".set-row[data-ed]").forEach(r=>{const nm=r.dataset.ed;
    r.querySelector('[data-act="edcolor"]').onchange=async e=>{const ed=EDITORS_LIST.find(x=>x.name===nm);if(ed){ed.color=e.target.value;await backend.saveEditors();afterConfigChange();}};
    r.querySelector('[data-act="edrm"]').onclick=async ()=>{if(!confirm(`Remove editor ${nm}?`))return;EDITORS_LIST=EDITORS_LIST.filter(x=>x.name!==nm);await backend.saveEditors();afterConfigChange();toast("Editor removed");};
  });
  scope.querySelectorAll(".set-row[data-cat]").forEach(r=>{const key=r.dataset.cat;
    r.querySelector('[data-act="ccolor"]').onchange=async e=>{const c=CATEGORIES.find(x=>x.key===key);if(c){c.color=e.target.value;await backend.saveCategories();afterConfigChange();}};
    r.querySelector('[data-act="clabel"]').onchange=async e=>{const c=CATEGORIES.find(x=>x.key===key);if(c){c.label=e.target.value.trim()||c.label;await backend.saveCategories();afterConfigChange();}};
    const rm=r.querySelector('[data-act="crm"]');if(rm)rm.onclick=async ()=>{if(!confirm("Remove this category?"))return;CATEGORIES=CATEGORIES.filter(x=>x.key!==key);await backend.saveCategories();afterConfigChange();toast("Category removed");};
  });
  scope.querySelectorAll(".set-row[data-typ]").forEach(r=>{const id=r.dataset.typ;
    r.querySelector('[data-act="tcolor"]').onchange=async e=>{const t=TYPE_MAP[id];if(t){t.color=e.target.value;await backend.saveTypes();afterConfigChange();}};
    r.querySelector('[data-act="tlabel"]').onchange=async e=>{const t=TYPE_MAP[id];if(t){t.label=e.target.value.trim()||t.label;await backend.saveTypes();afterConfigChange();}};
    r.querySelector('[data-act="tdue"]').onchange=async e=>{const t=TYPE_MAP[id];if(t){t.due=e.target.checked;await backend.saveTypes();afterConfigChange();}};
    const rm=r.querySelector('[data-act="trm"]');if(rm)rm.onclick=async ()=>{if(!confirm("Remove this edit type?"))return;TYPES=TYPES.filter(x=>x.id!==id);await backend.saveTypes();afterConfigChange();toast("Edit type removed");};
  });
}

function setView(v){state.view=v;document.querySelectorAll("[data-view]").forEach(x=>x.classList.toggle("active",x.dataset.view===v));}
function onStatClick(kind){
  if(kind==="dailies"){state.quick=null;state.tab="daily";buildTabs();setView("list");}
  else if(kind==="active"){state.quick=null;state.tab="master";buildTabs();setView("list");}
  else{state.quick=kind;state.tab="master";buildTabs();setView("list");}
  render();
}
function wireUp(){
  $("#openAdd").onclick=openAdd;$("#saveEntry").onclick=saveEntry;
  $("#catFilter").onchange=e=>{state.cat=e.target.value;render();};
  $("#asgFilter").onchange=e=>{state.assignee=e.target.value;render();};
  $("#sortBy").onchange=e=>{state.sort=e.target.value;render();};
  document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.quick=null;document.querySelectorAll("[data-view]").forEach(x=>x.classList.toggle("active",x===b));render();});
  document.addEventListener("click",e=>{const st=e.target.closest(".stat[data-stat]");if(st)onStatClick(st.dataset.stat);});
  $("#searchBox").oninput=e=>{state.search=e.target.value;render();};
  $("#themeBtn").onclick=toggleTheme;
  $("#compToggle").onclick=()=>{$("#compToggle").classList.toggle("open");$("#compBody").classList.toggle("open");};
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>b.closest(".scrim").classList.remove("open"));
  document.querySelectorAll(".scrim").forEach(s=>s.addEventListener("click",e=>{if(e.target===s)s.classList.remove("open");}));
  document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".scrim.open").forEach(s=>s.classList.remove("open"));});
}

init();

</script>
